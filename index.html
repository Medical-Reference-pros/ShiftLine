<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ShiftLine</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>ShiftLine</h1>
  <div id="saveStatus">✓ Saved</div>
</header>

<div class="patient-tabs">
  <div id="patientTabs"></div>
  <button id="addPatientBtn">+ Patient</button>
</div>

<div class="card">
  <h2 id="patientTitle">No Patient Selected</h2>
  <label>Weight (kg)</label>
  <input id="weightInput" type="number">
</div>

<div class="subtabs">
  <button class="active">Drips</button>
  <button>Report</button>
  <button>Lines</button>
  <button>Handoff</button>
</div>

<div class="card">
  <div class="section-header">
    <h3>Active Drips</h3>
    <button id="addDripBtn">+ Add Drip</button>
  </div>
  <div id="dripList"></div>
</div>

<div id="dripModal" class="modal hidden">
  <div class="modal-card">
    <h3>Add Drip</h3>
    <label>Drug</label>
    <select id="drugSelect"></select>
    <label>Dose</label>
    <input id="doseInput" type="number" step="0.1">
    <button id="saveDripBtn">Add Drip</button>
    <button id="closeModalBtn">Cancel</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
